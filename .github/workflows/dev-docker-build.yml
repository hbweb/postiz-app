name: Build and Publish Docker Image for Statsible

on:
  push:
    branches:
      - dev

permissions:
  contents: read
  packages: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build Docker image
        run: docker build -f Dockerfile.dev -t ghcr.io/hbweb/postiz-app:dev .

      - name: Push Docker image to GHCR
        run: docker push ghcr.io/hbweb/postiz-app:dev
